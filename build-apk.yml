name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch AndroidManifest — todos los permisos
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          sed -i 's|<application|<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <application|' "$MANIFEST"

          echo "✅ Permisos añadidos"
          grep -n "permission" "$MANIFEST"

      - name: Patch AndroidManifest — WebView flags
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          sed -i 's|android:hardwareAccelerated="true"|android:hardwareAccelerated="true"\n            android:usesCleartextTraffic="true"|' "$MANIFEST"

          echo "✅ WebView flags aplicados"

      - name: Patch MainActivity — habilitar TTS y notificaciones en WebView
        run: |
          MAIN="android/app/src/main/java/com/strongstep/app/MainActivity.java"

          # Añadir imports necesarios
          sed -i 's|import com.getcapacitor.BridgeActivity;|import com.getcapacitor.BridgeActivity;\nimport android.webkit.WebSettings;\nimport android.webkit.WebView;\nimport android.os.Bundle;\nimport androidx.core.app.ActivityCompat;\nimport android.Manifest;|' "$MAIN"

          # Añadir override onCreate con configuración de WebView y permisos
          sed -i 's|public class MainActivity extends BridgeActivity {|public class MainActivity extends BridgeActivity {\n\n  @Override\n  protected void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n\n    // Habilitar TTS (SpeechSynthesis) en WebView\n    WebView webView = getBridge().getWebView();\n    WebSettings settings = webView.getSettings();\n    settings.setMediaPlaybackRequiresUserGesture(false);\n    settings.setJavaScriptEnabled(true);\n    settings.setDomStorageEnabled(true);\n\n    // Solicitar permiso de notificaciones (Android 13+)\n    if (android.os.Build.VERSION.SDK_INT >= 33) {\n      ActivityCompat.requestPermissions(this,\n        new String[]{ Manifest.permission.POST_NOTIFICATIONS }, 1001);\n    }\n  }|' "$MAIN"

          echo "✅ MainActivity parcheada"
          cat "$MAIN"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/StrongStep.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: StrongStep-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/StrongStep.apk
          retention-days: 30
